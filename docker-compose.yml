version: '3.8'

services:

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: memento_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - memento_network

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: memento_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/flashcardapp
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - memento_network

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: memento_client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - memento_network

volumes:
  mongodb_data:

networks:
  memento_network:
    driver: bridge